<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background: radial-gradient(circle at top,#123d32,#071a15);

text-align:center;
}

/* NAVBAR */

nav{
display:flex;
justify-content:center;
gap:40px;
padding:25px;
background:rgba(255,255,255,0.04);

}

nav a{
text-decoration:none;
color:white;
font-size:14px;
letter-spacing:1px;
padding:10px 18px;

margin-bottom:40px;
}

/* BUTTONS */

.main-buttons{
display:flex;
justify-content:center;
gap:25px;
margin-top:40px;
}

.btn{
text-decoration:none;
padding:15px 30px;
border:1px solid #d4af37;
border-radius:10px;
color:white;
letter-spacing:1px;
transition:0.3s;

}

/* GOLD HOVER */

.btn:hover{
background:#d4af37;
color:#0b2e25;
box-shadow:0 0 20px rgba(212,175,55,0.5);

/* PREMIUM SHOP BUTTON */

.shop-btn{
background:linear-gradient(135deg,rgba(212,175,55,0.15),rgba(212,175,55,0.05));

footer{
