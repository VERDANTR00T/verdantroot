<!DOCTYPE html>
<html>
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Verdant Root Shop</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#123d32,#071a15);
color:white;
}

header{
display:flex;
justify-content:space-between;
align-items:center;
padding:25px 40px;
}

.logo{
font-family:'Playfair Display',serif;
font-size:28px;
color:#d4af37;
}

nav a{
margin-left:25px;
text-decoration:none;
color:white;
font-size:15px;
}

nav a:hover{
color:#d4af37;
}

.cart{
background:#d4af37;
color:#071a15;
padding:8px 14px;
border-radius:20px;
font-weight:600;
}

.container{
max-width:1200px;
margin:auto;
padding:40px;
}

.title{
font-family:'Playfair Display',serif;
font-size:38px;
margin-bottom:30px;
text-align:center;
}

.products{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:30px;
}

.card{
background:rgba(255,255,255,0.05);
border-radius:15px;
padding:20px;
text-align:center;
backdrop-filter:blur(10px);
}

.card img{
width:100%;
border-radius:10px;
}

.product-name{
font-size:18px;
margin-top:15px;
}

.price{
color:#d4af37;
margin-top:6px;
}

button{
margin-top:12px;
padding:10px 18px;
border:none;
border-radius:8px;
cursor:pointer;
font-size:14px;
}

.add{
background:#d4af37;
color:#071a15;
}

.remove{
background:#444;
color:white;
}

.buy{
background:transparent;
border:1px solid #d4af37;
color:#d4af37;
}

.buy:hover{
background:#d4af37;
color:#071a15;
}

</style>

</head>

<body>

<header>

<div class="logo">Verdant Root</div>

<nav>

<a href="index.html">Home</a>
<a href="analysis.html">AI Scan</a>

<span class="cart">
🛒 Cart <span id="count">0</span>
</span>

</nav>

</header>

<div class="container">

<div class="title">Verdant Root Premium Store</div>

<div class="products">

<div class="card">
<img src="https://picsum.photos/300/200?1">
<div class="product-name">Vitamin C Serum</div>
<div class="price">₹799</div>
<button class="add" onclick="add()">Add to Cart</button>
<button class="remove" onclick="remove()">Remove</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?2">
<div class="product-name">Hydrating Cleanser</div>
<div class="price">₹599</div>
<button class="add" onclick="add()">Add to Cart</button>
<button class="remove" onclick="remove()">Remove</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?3">
<div class="product-name">Niacinamide Cream</div>
<div class="price">₹899</div>
<button class="add" onclick="add()">Add to Cart</button>
<button class="remove" onclick="remove()">Remove</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

<div class="card">
<img src="https://picsum.photos/300/200?4">
<div class="product-name">Sunscreen SPF50</div>
<div class="price">₹699</div>
<button class="add" onclick="add()">Add to Cart</button>
<button class="remove" onclick="remove()">Remove</button>
<button class="buy" onclick="buy()">Buy Now</button>
</div>

</div>

</div>

<script>

let cart=0;

function add(){
cart++;
document.getElementById("count").innerText=cart;
}

function remove(){
if(cart>0){
cart--;
document.getElementById("count").innerText=cart;
}
}

function buy(){
alert("Checkout system will be added in future update.");
}

</script>

</body>
</html>
