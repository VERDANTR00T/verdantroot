<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Skin Intelligence | Verdant Root</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
    background: radial-gradient(circle at top, #123d32, #071a15);
    color: #ffffff;
}

.wrapper {
    max-width: 800px;
    margin: 70px auto;
    padding: 50px;
    background: rgba(255,255,255,0.06);
    backdrop-filter: blur(25px);
    border-radius: 20px;
    box-shadow: 0 30px 80px rgba(0,0,0,0.6);
}

h1 {
    font-family: 'Playfair Display', serif;
    text-align: center;
    font-size: 38px;
}

.subtitle {
    text-align: center;
    opacity: 0.75;
    margin-bottom: 40px;
}

.step {
    display: none;
    animation: fade 0.6s ease;
}

.step.active {
    display: block;
}

@keyframes fade {
    from {opacity: 0; transform: translateY(10px);}
    to {opacity: 1; transform: translateY(0);}
}

label {
    display: block;
    margin-top: 25px;
    font-size: 13px;
    letter-spacing: 1px;
}

input, select, textarea {
    width: 100%;
    padding: 14px;
    margin-top: 8px;
    background: rgba(255,255,255,0.08);
    border: 1px solid rgba(255,255,255,0.2);
    border-radius: 10px;
    color: white;
    font-size: 14px;
}

button {
    margin-top: 35px;
    padding: 14px 30px;
    border: 1px solid #d4af37;
    background: transparent;
    color: white;
    letter-spacing: 2px;
    cursor: pointer;
    transition: 0.3s;
    font-family: 'Playfair Display', serif;
    font-weight: 600;
    border-radius: 12px;
    box-shadow: 0 4px 15px rgba(212, 175, 55, 0.4);
}

button:hover {
    background: #d4af37;
    color: #0b2e25;
}

button .arrow {
    display: inline-block;
    margin-left: 10px;
    font-weight: bold;
    font-size: 20px;
    transition: transform 0.3s ease;
}

button:hover .arrow {
    transform: translateX(5px);
}

.progress {
    width: 100%;
    height: 200px; /* tall for camera-style scan */
    background: rgba(255,255,255,0.05);
    border-radius: 12px;
    margin-top: 30px;
    position: relative;
    overflow: hidden;
    box-shadow: inset 0 0 15px rgba(0,0,0,0.5);
}

.scan-line {
    position: absolute;
    top: -2px;
    left: 0;
    width: 100%;
    height: 2px;
    background: linear-gradient(to right, rgba(212,175,55,0.0), rgba(212,175,55,0.8), rgba(212,175,55,0.0));
    animation: scanAnim 2s linear infinite;
}

@keyframes scanAnim {
    0% { top: 0; }
    100% { top: 100%; }
}

.result-card {
    margin-top: 30px;
    padding: 35px;
    background: rgba(255,255,255,0.08);
    border-radius: 15px;
    line-height: 1.8;
    box-shadow: 0 8px 20px rgba(0,0,0,0.5);
}

#jitsiContainer {
    width: 100%;
    height: 500px;
    margin-top: 30px;
    border-radius: 15px;
    overflow: hidden;
}
</style>
</head>

<body>

<div class="wrapper">

<h1>AI Skin Intelligence</h1>
<p class="subtitle">Clinical-grade preliminary digital evaluation</p>

<!-- Step 1 -->
<div class="step active" id="step1">
<label>Full Name</label>
<input type="text" id="name">

<label>Age</label>
<input type="number" id="age">

<button onclick="nextStep()">CONTINUE</button>
</div>

<!-- Step 2 -->
<div class="step" id="step2">
<label>Primary Skin Concern</label>
<select id="concern">
<option>Acne</option>
<option>Pigmentation</option>
<option>Dryness</option>
<option>Oiliness</option>
<option>Dark Spots</option>
<option>Sensitivity</option>
</select>

<label>Describe Symptoms</label>
<textarea id="description" rows="4"></textarea>

<label>Lifestyle / Daily Habits</label>
<textarea id="habits" rows="3" placeholder="Sleep, diet, skincare routine..."></textarea>

<label>Any Allergies / Sensitive Ingredients?</label>
<textarea id="allergies" rows="2"></textarea>

<label>Upload Skin Image (optional)</label>
<input type="file" id="skinImage" accept="image/*">

<button onclick="startAnalysis()">BEGIN AI ANALYSIS</button>
</div>

<!-- Step 3 -->
<div class="step" id="step3">
<p>Analyzing skin biomarkers...</p>

<div class="progress">
    <div class="scan-line"></div>
</div>

<div id="resultArea"></div>

<button id="startConsultBtn" style="display:none; margin-top:20px;">Start Live Consultation</button>
<div id="jitsiContainer"></div>
</div>

</div>

<script src='https://meet.jit.si/external_api.js'></script>
<script>
function nextStep() {
    document.getElementById("step1").classList.remove("active");
    document.getElementById("step2").classList.add("active");
}

function startAnalysis() {
    document.getElementById("step2").classList.remove("active");
    document.getElementById("step3").classList.add("active");

    // Scan animation is always running via CSS

    setTimeout(function() {
        const name = document.getElementById("name").value;
        const concern = document.getElementById("concern").value;
        const description = document.getElementById("description").value;
        const habits = document.getElementById("habits").value;
        const allergies = document.getElementById("allergies").value;
        const imageFile = document.getElementById("skinImage").files[0] ? "Uploaded" : "No image";

        const tips = [
            `Skin Concern: ${concern}`,
            `Symptoms: ${description}`,
            `Lifestyle: ${habits}`,
            `Allergies: ${allergies}`,
            `Image Provided: ${imageFile}`,
            "Tip 1: Use gentle, non-comedogenic products",
            "Tip 2: Maintain hydration and sunscreen daily",
            "Tip 3: Follow routine consistently",
            "Tip 4: Consult a specialist if condition persists"
        ];

        let tipsHTML = "<div class='result-card'><h2>Advanced AI + Doctor Verified Tips:</h2><ul>";
        tips.forEach(tip => { tipsHTML += `<li>${tip}</li>`; });
        tipsHTML += `</ul><button onclick="window.location.href='index.html'">Return Home <span class="arrow">➜</span></button></div>`;

        document.getElementById("resultArea").innerHTML = tipsHTML;

        // Show "Start Live Consultation" button
        const consultBtn = document.getElementById("startConsultBtn");
        consultBtn.style.display = "inline-block";
        consultBtn.onclick = function() {
            const domain = "meet.jit.si";
            const options = {
                roomName: "VerdantRoot_Consultation_" + Date.now(),
                parentNode: document.querySelector('#jitsiContainer'),
                width: "100%",
                height: 500
            };
            const api = new JitsiMeetExternalAPI(domain, options);
            consultBtn.style.display = "none"; // hide after clicked
        };

    }, 2600);
}
</script>

</body>
</html>
