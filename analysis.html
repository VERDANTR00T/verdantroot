<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>AI Skin Intelligence | Verdant Root</title>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=Inter:wght@300;400;500&display=swap" rel="stylesheet">
<style>
body{
margin:0;
font-family:'Inter',sans-serif;
background:radial-gradient(circle at top,#123d32,#071a15);
color:white;
}
.wrapper{
max-width:820px;
margin:70px auto;
padding:50px;
background:rgba(255,255,255,0.06);
backdrop-filter:blur(25px);
border-radius:20px;
box-shadow:0 30px 90px rgba(0,0,0,0.6);
}
h1{font-family:'Playfair Display',serif;text-align:center;font-size:38px;}
.subtitle{text-align:center;opacity:0.75;margin-bottom:40px;}
.step{display:none;animation:fade 0.6s ease;}
.step.active{display:block;}
@keyframes fade{from{opacity:0;transform:translateY(10px);}to{opacity:1;transform:translateY(0);}}
label{display:block;margin-top:25px;font-size:13px;letter-spacing:1px;}
input,select,textarea{width:100%;padding:14px;margin-top:8px;background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.2);border-radius:10px;color:white;font-size:14px;}
button{margin-top:35px;padding:14px 30px;border:1px solid #d4af37;background:transparent;color:white;letter-spacing:2px;cursor:pointer;transition:0.3s;}
button:hover{background:#d4af37;color:#0b2e25;}
.progress{width:100%;height:6px;background:rgba(255,255,255,0.1);border-radius:10px;margin-top:30px;overflow:hidden;}
.progress-bar{height:100%;width:0%;background:#d4af37;transition:width 4s ease;}
.scan-box{margin-top:30px;height:220px;border-radius:15px;background:rgba(255,255,255,0.05);position:relative;overflow:hidden;box-shadow:0 0 30px rgba(212,175,55,0.3);}
.scan-line{position:absolute;width:100%;height:3px;background:#d4af37;animation:scan 2s infinite;}
@keyframes scan{0%{top:0;}50%{top:100%;}100%{top:0;}}
.ai-text{margin-top:20px;font-size:14px;opacity:0.85;letter-spacing:0.5px;transition:0.4s ease;}
.result-card{margin-top:35px;padding:35px;background:rgba(255,255,255,0.08);border-radius:18px;line-height:1.8;border:1px solid rgba(255,255,255,0.15);backdrop-filter:blur(12px);box-shadow:0 15px 35px rgba(0,0,0,0.5);}
.beta-title{font-family:'Playfair Display',serif;font-size:24px;margin-bottom:15px;color:#d4af37;}
.home-btn{margin-top:35px;text-align:center;}
.home-btn a{display:inline-flex;align-items:center;gap:8px;padding:14px 30px;border:1px solid #d4af37;border-radius:30px;text-decoration:none;color:white;letter-spacing:1px;transition:0.3s;font-weight:500;}
.home-btn a:hover{background:#d4af37;color:#0b2e25;}
.home-btn a .icon{font-size:20px;border:2px solid white;width:24px;height:24px;display:flex;align-items:center;justify-content:center;border-radius:50%;transition:0.3s;}
.home-btn a:hover .icon{border-color:#0b2e25;color:#0b2e25;}
.feature-cards{display:flex;flex-wrap:wrap;justify-content:center;gap:25px;margin-top:30px;}
.feature-card{background:rgba(255,255,255,0.05);backdrop-filter:blur(12px);border-radius:18px;padding:20px;width:220px;border:1px solid rgba(255,255,255,0.15);transition:0.3s;}
.feature-card:hover{transform:translateY(-8px);box-shadow:0 15px 50px rgba(212,175,55,0.3);}
.feature-card h4{font-family:'Playfair Display',serif;color:#d4af37;margin-bottom:12px;}
.feature-card p{font-size:13px;line-height:1.5;opacity:0.8;}
/* 3D metrics bars */
.metrics{margin-top:25px;display:flex;justify-content:space-between;gap:15px;}
.metric-card{flex:1;background:rgba(255,255,255,0.08);backdrop-filter:blur(12px);padding:15px;border-radius:12px;text-align:center;box-shadow:0 8px 25px rgba(0,0,0,0.3);transition:0.3s;}
.metric-card h5{margin:0;color:#d4af37;font-family:'Playfair Display',serif;font-size:16px;}
.metric-card .bar{height:6px;background:rgba(212,175,55,0.4);border-radius:6px;margin-top:10px;overflow:hidden;}
.metric-card .bar-inner{height:100%;width:0%;background:#d4af37;border-radius:6px;transition:width 2.5s ease;}
.metric-card:hover{transform:translateY(-4px);box-shadow:0 12px 35px rgba(212,175,55,0.4);}
</style>
</head>
<body>

<div class="wrapper">
<h1>AI Skin Intelligence</h1>
<p class="subtitle">Clinical-grade preliminary digital evaluation</p>

<!-- STEP 1 -->
<div class="step active" id="step1">
<label>Full Name</label>
<input type="text" id="name">
<label>Age</label>
<input type="number" id="age">
<button onclick="nextStep()">CONTINUE</button>
</div>

<!-- STEP 2 -->
<div class="step" id="step2">
<label>Primary Skin Concern</label>
<select id="concern">
<option>Acne</option>
<option>Pigmentation</option>
<option>Dryness</option>
<option>Oiliness</option>
<option>Dark Spots</option>
<option>Sensitivity</option>
</select>
<label>Describe Symptoms</label>
<textarea id="description" rows="4"></textarea>
<label>Upload Face Image</label>
<input type="file" accept="image/*" id="faceImage">
<button onclick="startAnalysis()">BEGIN AI ANALYSIS</button>
</div>

<!-- STEP 3 -->
<div class="step" id="step3">
<p>AI system processing dermal signals...</p>
<div class="scan-box">
<div class="scan-line"></div>
</div>
<div class="progress">
<div class="progress-bar" id="bar"></div>
</div>
<p class="ai-text" id="aiText">Initializing AI diagnostic engine...</p>
<div class="metrics" id="metricsContainer"></div>
<div id="resultArea"></div>
</div>

</div>

<script>
function nextStep(){
document.getElementById("step1").classList.remove("active");
document.getElementById("step2").classList.add("active");
}
function startAnalysis(){
document.getElementById("step2").classList.remove("active");
document.getElementById("step3").classList.add("active");
document.getElementById("bar").style.width="100%";

var messages=[
"Initializing AI diagnostic engine...",
"Mapping facial dermal zones...",
"Scanning inflammation signals...",
"Analyzing pigmentation clusters...",
"Processing dermatology dataset..."
];
var i=0;
var interval=setInterval(function(){
document.getElementById("aiText").innerText=messages[i];
i++;
if(i>=messages.length){clearInterval(interval);}
},900);

setTimeout(function(){
var name=document.getElementById("name").value;
var concern=document.getElementById("concern").value;

// metrics example
var metricsHTML="";
var metrics=[{title:"Hydration",value:80},{title:"Acne",value:60},{title:"Pigmentation",value:70}];
metrics.forEach(m=>{
metricsHTML+="<div class='metric-card'><h5>"+m.title+"</h5><div class='bar'><div class='bar-inner' style='width:"+m.value+"%'></div></div></div>";
});
document.getElementById("metricsContainer").innerHTML=metricsHTML;

document.getElementById("resultArea").innerHTML=
"<div class='result-card'>"+
"<div class='beta-title'>Verdant Root AI Beta Program</div>"+
"<strong>Subject:</strong> "+name+"<br>"+
"<strong>Primary Concern:</strong> "+concern+"<br><br>"+
"Our AI skin diagnostic platform is currently in beta development.<br><br>"+
"<em>Future features:</em>"+
"<div class='feature-cards'>"+
"<div class='feature-card'><h4>Dermatologist Connect</h4><p>Consult certified dermatologists directly via chat/video.</p></div>"+
"<div class='feature-card'><h4>Routine Guidance</h4><p>Receive affordable personalized skincare routines.</p></div>"+
"<div class='feature-card'><h4>Progress Tracker</h4><p>Track weekly improvements with AI-powered metrics.</p></div>"+
"</div>"+
"<br><em>This tool provides educational insights and is not a medical diagnosis.</em>"+
"</div>"+
"<div class='home-btn'>"+
"<a href='index.html'><span class='icon'>&#10132;</span> Return Home</a>"+
"</div>";
},5000);
}
</script>

</body>
</html>
